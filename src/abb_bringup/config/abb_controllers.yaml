controller_manager:
  ros__parameters:
    update_rate: 250
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    forward_command_controller_position:
      type: forward_command_controller/ForwardCommandController
joint_trajectory_controller:
  ros__parameters:
    joints:
    - joint_1
    - joint_2
    - joint_3
    - joint_4
    - joint_5
    - joint_6
    command_interfaces:
    - position
    - velocity
    state_interfaces:
    - position
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.1
      goal_time: 10.0
      joint_1:
        trajectory: 1.0
        goal: 0.05
      joint_2:
        trajectory: 1.0
        goal: 0.05
      joint_3:
        trajectory: 1.0
        goal: 0.05
      joint_4:
        trajectory: 1.0
        goal: 0.05
      joint_5:
        trajectory: 1.0
        goal: 0.05
      joint_6:
        trajectory: 1.0
        goal: 0.05
forward_command_controller_position:
  ros__parameters:
    joints:
    - joint_1
    - joint_2
    - joint_3
    - joint_4
    - joint_5
    - joint_6
    interface_name: position
